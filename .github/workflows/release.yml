name: Release

on:
  release:
    types: [published]

env:
  RELEASE_VERSION: ${{ github.event.release.tag_name }}

permissions:
  contents: write

jobs:
  sync-readme:
    name: Update README release examples
    runs-on: ubuntu-22.04

    steps:
      - name: Check out default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Update README release version
        run: python scripts/update-readme-release-version.py "${RELEASE_VERSION}"

      - name: Refresh package metadata
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Commit README release version
        run: |
          if git diff --quiet -- README.md src/google_finance_mcp.egg-info/PKG-INFO src/google_finance_mcp.egg-info/SOURCES.txt; then
            echo "README release examples already match ${RELEASE_VERSION}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md src/google_finance_mcp.egg-info/PKG-INFO src/google_finance_mcp.egg-info/SOURCES.txt
          git commit -m "docs: update release download version to ${RELEASE_VERSION}"
          git push origin HEAD:${{ github.event.repository.default_branch }}

  macos:
    name: Build macOS arm64 installer
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Verify runner architecture
        run: test "$(uname -m)" = "arm64"

      - name: Build macOS binary and installer
        env:
          ARCH: arm64
        run: VERSION="${RELEASE_VERSION}" bash scripts/build-macos-release.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-finance-mcp-macos-arm64
          path: dist/macos-release/*
          if-no-files-found: error

  linux:
    name: Build Linux x86_64 binary
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build Linux binary
        env:
          ARCH: x86_64
        run: VERSION="${RELEASE_VERSION}" bash scripts/build-linux-release.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-finance-mcp-linux-x86_64
          path: dist/linux-release/*
          if-no-files-found: error

  windows:
    name: Build Windows x86_64 executable
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build Windows executable
        env:
          ARCH: x86_64
        shell: pwsh
        run: |
          $env:VERSION = $env:RELEASE_VERSION
          ./scripts/build-windows-release.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-finance-mcp-windows-x86_64
          path: dist/windows-release/*
          if-no-files-found: error

  publish:
    name: Upload release assets
    runs-on: ubuntu-22.04
    needs:
      - macos
      - linux
      - windows

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: release-assets/*
          fail_on_unmatched_files: true
